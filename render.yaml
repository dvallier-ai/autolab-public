services:
  - type: web
    name: autolab
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: AUTOLAB_STATE_DIR
        value: /data/.autolab
      - key: AUTOLAB_WORKSPACE_DIR
        value: /data/workspace
      - key: AUTOLAB_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: autolab-data
      mountPath: /data
      sizeGB: 1
