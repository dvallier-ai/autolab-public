services:
  autolab-gateway:
    image: ${AUTOLAB_IMAGE:-autolab:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      AUTOLAB_GATEWAY_TOKEN: ${AUTOLAB_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${AUTOLAB_CONFIG_DIR}:/home/node/.autolab
      - ${AUTOLAB_WORKSPACE_DIR}:/home/node/.autolab/workspace
    ports:
      - "${AUTOLAB_GATEWAY_PORT:-18789}:18789"
      - "${AUTOLAB_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${AUTOLAB_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  autolab-cli:
    image: ${AUTOLAB_IMAGE:-autolab:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      AUTOLAB_GATEWAY_TOKEN: ${AUTOLAB_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${AUTOLAB_CONFIG_DIR}:/home/node/.autolab
      - ${AUTOLAB_WORKSPACE_DIR}:/home/node/.autolab/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
